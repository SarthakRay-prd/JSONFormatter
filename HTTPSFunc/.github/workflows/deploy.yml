name: Deploy to Azure Function App (func-workshop-sarray)

# Trigger the workflow automatically on every push to the specified branch
on:
  push:
    branches:
      - capstone

# Define environment variables to make the script reusable
env:
  AZURE_FUNCTIONAPP_NAME: 'func-workshop-sarray' 
  NODE_VERSION: '22.x'                           # <--- UPDATED: Now matches your Azure Node 22 environment
  PACKAGE_PATH: '.'                              # <--- REMAINS '.': Root directory of the repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code from the capstone branch
      - name: 'Checkout Repository Code'
        uses: actions/checkout@v4

      # Step 2: Set up the Node.js environment
      - name: 'Setup Node.js Environment'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Deploy to Azure Function App
      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
