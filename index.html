<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Difference Calculator</title>
    <style>
        /* Simple styling as requested */
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
        }
        .container {
            text-align: center;
        }
        input {
            background-color: white;
            color: black;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkgreen;
        }
        #result {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Calculate Days Between Dates</h2>
        <input type="text" id="date1" placeholder="Date 1 (ddmmyyyy)" maxlength="8">
        <input type="text" id="date2" placeholder="Date 2 (ddmmyyyy)" maxlength="8">
        <br>
        <button onclick="calculateDifference()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        async function calculateDifference() {
            const date1 = document.getElementById('date1').value.trim();
            const date2 = document.getElementById('date2').value.trim();
            const resultDiv = document.getElementById('result');

            // Client-side validation check
            if (!date1 || !date2) {
                resultDiv.innerText = "Please enter both dates.";
                resultDiv.style.color = "orange";
                return;
            }

            resultDiv.innerText = "Calculating...";
            resultDiv.style.color = "white";

            try {
                // IMPORTANT: Replace the URL below with your actual Azure Function URL if hosting separately
                // e.g. https://func-workshop-sarray.azurewebsites.net/api/HTTPSFunc
                const functionUrl = `/api/HTTPSFunc?date1=${date1}&date2=${date2}`;
                
                const response = await fetch(functionUrl);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerText = `Difference: ${data.differenceInDays} days`;
                    resultDiv.style.color = "lightgreen";
                } else {
                    resultDiv.innerText = `Error: ${data.error}`;
                    resultDiv.style.color = "red";
                }
            } catch (error) {
                resultDiv.innerText = "Error connecting to the API. Check CORS or URL.";
                resultDiv.style.color = "red";
            }
        }
    </script>

</body>
</html>
